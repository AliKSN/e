<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E Translator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" aria-labelledby="title">
      <section class="panel">
        <div class="header">
          <div>
            <p class="eyebrow">E Translator</p>
            <h1 id="title">Turn text into e, then back again.</h1>
          </div>
          <div class="mode-switch" role="group" aria-label="Translation mode">
            <button class="mode-button active" type="button" data-mode="encode">
              Text to e
            </button>
            <button class="mode-button" type="button" data-mode="decode">
              E to text
            </button>
          </div>
        </div>

        <div class="translator">
          <label class="field">
            <span id="input-label">Text</span>
            <textarea
              id="source"
              spellcheck="false"
              placeholder="Type something like: hello world"
            ></textarea>
          </label>

          <div class="actions">
            <button id="swap" type="button" title="Swap input and output">
              Swap
            </button>
            <button id="copy" type="button">Copy result</button>
            <button id="clear" type="button">Clear</button>
          </div>

          <label class="field">
            <span id="output-label">E translation</span>
            <textarea id="result" readonly spellcheck="false"></textarea>
          </label>
        </div>

        <p class="rule">
          Letters become repeated e characters: a = e, b = ee, c = eee. In E
          to text mode, one space separates letters and two spaces become one
          text space.
        </p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
